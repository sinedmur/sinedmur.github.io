<div class="mainmenu">
    <div class="title">Приобрести прослушивания</div>
    <div class="buy__container">
        <div class="description">Здесь Вы можете приобрести прослушивания для своего трека</div>
    </div>
    <div class="search__container">
        <div class="loopa"><img src="./img/search_icon.svg" alt="img"></div>
        <input type="text" id="searchInput" class="search" placeholder="Поиск">
    </div>
    <div class="searchmusic__container"></div>
    <div class="dno">Выберите интересующий Вас трек</div>
    <div class="cart__container">
        <div class="balance2">БАЛАНС</div>
        <div class="balanc2">
            <div class="token"><img src="./img/donatmoney.svg" alt="token"></div>
            <div class="valuedonat">0</div>
        </div>
        <div class="quantity__container">
            <div class="quantity">Количество</div>
            <input type="text" id="quantityInput" class="quantity__input" placeholder="от 1">
        </div>
        <div class="price__container">
            <div class="price">Цена
                <div class="price_img"><img src="./img/donatmoney.svg" alt="token"></div>
            </div>
            <input type="text" id="priceInput" class="price__input" placeholder="от 1">
        </div>
        <div class="total__container">
            <div class="total">Итого
                <div class="total_img"><img src="./img/donatmoney.svg" alt="token"></div>
            </div>
            <div class="total__put"></div>
        </div>
        <div class="annotation">Чем выше цена за 1 прослушивание, тем чаще трек будет попадаться пользователям</div>
        <div class="order__container">
            <div class="order">Заказать</div>
        </div>
    </div>
</div>
