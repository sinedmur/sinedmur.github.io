<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyrneo</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
    <div class="wrapper">
        <div class="mainmenu">
            <div class="title">Главное меню</div>
            <div class="balance">БАЛАНС</div>
            <div class="balanc">
                <div class="token"><img src="./img/token.svg" alt="token"></div>
                <div class="value">0</div>
            </div>
            <div class="menu__container">
                <div class="btn_missions" data-page="missions.html"><img src="./img/Missions.svg" data-default="./img/Missions.svg" alt="btn" /></div>
                <div class="btn_buy" data-page="buy.html"><img src="./img/Buy.svg" data-default="./img/Buy.svg" alt="btn" /></div>
                <div class="btn_settings" data-page="settings.html"><img src="./img/Settings.svg" data-default="./img/Settings.svg" alt="btn" /></div>
            </div>
            <audio class="audio" src="./audio/chains.mp3"></audio>
            <div class="audio__container">
                <div class="buttons">
                    <div class="btn_play"><img class="img__src" src="./img/Playmini.svg" alt="btn" /></div>
                    <div class="song">
                        <div class="songtitle">Цепи <img src="./img/Explicit.svg" alt="exp"></div>
                        <div class="songautor">Скриптонит feat. 104</div>
                    </div>
                    <div class="btn_next"><img class="img__close" src="./img/Nextmini.svg" alt="btn" /></div>
                    <!-- <div class="btn_close"><img src="./img/Closemini.svg" alt="btn" /></div> -->
                </div>
            </div>
            <div class="undermenu__container">
                <div class="btn_menu" data-page="index.html">
                    <img class="menu__src" src="./img/Menu.svg" data-default="./img/Menu.svg" data-active="./img/MenuActive.svg" alt="btn" />
                </div>
                <div class="btn_music" data-page="music.html">
                    <img class="music__src" src="./img/music.svg" data-default="./img/music.svg" data-active="./img/musicActive.svg" alt="btn" />
                </div>
                <div class="btn_airdrop" data-page="airdrop.html">
                    <img class="airdrop__src" src="./img/AirDrop.svg" data-default="./img/AirDrop.svg" data-active="./img/AirDropActive.svg" alt="btn" />
                </div>
                <div class="btn_friends" data-page="friends.html">
                    <img class="friends__src" src="./img/Friends.svg" data-default="./img/Friends.svg" data-active="./img/FriendsActive.svg" alt="btn" />
                </div>
                <div class="btn_wallet" data-page="wallet.html">
                    <img class="wallet__src" src="./img/Wallet.svg" data-default="./img/Wallet.svg" data-active="./img/WalletActive.svg" alt="btn" />
                </div>
            </div>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
