<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyrneo</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
    <div class="wrapper">
        <div class="mainmenu">
            <div class="title">Главное меню</div>
            <div class="balance">БАЛАНС</div>
            <div class="balanc">
                <div class="token"><img src="./img/token.svg" alt="token"></div>
                <div class="value">0</div>
            </div>
            <div class="menu__container">
                <div class="btn_missions"><img src="./img/Missions.svg" alt="btn" /></div>
                <div class="btn_buy"><img src="./img/Buy.svg" alt="btn" /></div>
                <div class="btn_settings"><img src="./img/Settings.svg" alt="btn" /></div>
            </div>
            <audio class="audio" src="./audio/chains.mp3"></audio>
            <div class="audio__container">
                <div class="buttons">
                    <div class="btn_play"><img class="img__src" src="./img/Playmini.svg" alt="btn" /></div>
                    <div class="song">
                        <div class="songtitle">Цепи</div>
                        <div class="songautor">Скриптонит feat. 104</div>
                    </div>
                    <div class="btn_next"><img class="img__close" src="./img/Nextmini.svg" alt="btn" /></div>
                    <!-- <div class="btn_close"><img src="./img/Closemini.svg" alt="btn" /></div> -->
                </div>
            </div>
            <div class="undermenu__container">
                <div class="btn_menu"><img class="menu__src" src="./img/Menu.svg" alt="btn" /></div>
                <div class="btn_music"><img class="music__src" src="./img/music.svg" alt="btn" /></div>
                <div class="btn_airdrop"><img class="airdrop__src" src="./img/AirDrop.svg" alt="btn" /></div>
                <div class="btn_friends"><img class="friends__src" src="./img/Friends.svg" alt="btn" /></div>
                <div class="btn_wallet"><img class="wallet__src" src="./img/Wallet.svg" alt="btn" /></div>
            </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
