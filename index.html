<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyrneo</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="preload" href="./css/main.css" as="style" />
    <link rel="preload" href="./js/main.js" as="script" />
    <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
    <div class="wrappertitle">
        <div class="hometitle">
            <div class="topmenu__container">
                <div class="subscribe__container">
                    <div class="telegramicon"><img src="./img/telegramicon.svg" alt=""></div>
                    <div class="youtubeicon"><img src="./img/youtubeicon.svg" alt=""></div>
                    <div class="subscribe">Подпишись</div>
                </div>
                <div class="language__container">
                    <div class="language">Язык</div>
                    <div class="flag"><img src="./img/flag.svg" alt=""></div>
                </div>
                <div class="whitepaper__container">
                    <div class="whitepaper">Whitepaper</div>
                </div>
            </div>
            <div class="obj2">
                <div class="title2">Слушай свои любимые треки и зарабатывай</div>
                <div class="description2">Получай нотки за прослушивание любых треков, покупай прослушивания на свои треки или на понравившиеся, сделай артисту приятно, завоюй топ-1 слушателей, попади своим треком в топы чартов, приглашай друзей</div>
            </div>
            <div class="playgame__container">
                <a href="https://t.me/mmusicmmoney_bot">
                    <div class="playgame"><img src="./img/Launch.svg" alt="btn"></div>
                </a>
            </div>
        </div>
    </div>
    <script src="./js/main.js"></script>
