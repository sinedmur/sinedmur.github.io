<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyrneo</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="preload" href="./css/main.css" as="style" />
    <link rel="preload" href="./js/main.js" as="script" />
    <link rel="preload" href="./audio/chains.mp3" as="audio" />
    <link rel="preload" href="./img/token.svg" as="image" />
    <link rel="preload" href="./img/Missions.svg" as="image" />
    <link rel="preload" href="./img/Buy.svg" as="image" />
    <link rel="preload" href="./img/Settings.svg" as="image" />
    <link rel="preload" href="./img/Playmini.svg" as="image" />
    <link rel="preload" href="./img/Nextmini.svg" as="image" />
    <link rel="preload" href="./img/Menu.svg" as="image" />
    <link rel="preload" href="./img/music.svg" as="image" />
    <link rel="preload" href="./img/AirDrop.svg" as="image" />
    <link rel="preload" href="./img/Friends.svg" as="image" />
    <link rel="preload" href="./img/Wallet.svg" as="image" />
    <link rel="stylesheet" href="./css/main.css" />
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.min.js"></script>

</head>

<body>
    <div class="wrapper">
        <div class="mainmenu">
            <div class="obj">
                <div class="title">Главное мемню</div>
                <div id="user-info">
                    <img id="avatar" src="" alt="User Avatar" style="display:none;">
                </div>
            </div>
            <div class="balance">БАЛАНС</div>
            <div class="balanc">
                <div class="token"><img src="./img/token.svg" alt="token"></div>
                <div class="value">0</div>
            </div>
            <div class="balanc">
                <div class="token"><img src="./img/donatmoney.svg" alt="token"></div>
                <div class="valuedonat">0</div>
            </div>
            <div class="menu__container">
                <div class="btn_missions" data-page="missions.html"><img src="./img/Missions.svg"
                        data-default="./img/Missions.svg" alt="btn" /></div>
                <div class="btn_buy" data-page="buy.html"><img src="./img/Buy.svg" data-default="./img/Buy.svg"
                        alt="btn" /></div>
                <div class="btn_settings" data-page="settings.html"><img src="./img/Settings.svg"
                        data-default="./img/Settings.svg" alt="btn" /></div>
            </div>
        </div>
        <div class="player__container">
            <div class="title_player">
                <div class="title__player">
                    <div class="playlist">ПЛЕЙЛИСТ</div>
                    <div class="playlist_name">LISTEN TO EARN</div>
                </div>
            </div>
            <div class="cover"><img class="cover__src" src="./img/cover1.jpeg" alt="cover"></div>
            <div class="song__container">
                <div class="song_container">
                    <div class="songname"></div>
                    <div class="authors">
                        <div class="songautor"></div>
                        <div class="feat"></div>
                        <div class="songautors"></div>
                    </div>
                </div>
                <div class="like"><img class="like__src" src="./img/Like.svg" alt="btn"></div>
            </div>
            <div class="pr__container">
                <div class="pr">Здесь могла быть Ваша реклама<img src="" alt=""></div>
            </div>
            <div class="progress__container">
                <div class="progress"></div>
            </div>
            <div class="duration__container">
                <div class="time">0:00</div>
                <div class="end__time"></div>
            </div>
            <div class="buttons__container">
                <div class="stroke1">
                    <div class="random_btn"><img class="random__src" src="./img/Random.svg" alt="btn"></div>
                    <div class="prev_btn"><img src="./img/Prev.svg" alt="btn"></div>
                    <div class="play_btn"><img class="play__src" src="./img/Play.svg" alt="btn"></div>
                    <div class="next_btn"><img src="./img/Next.svg" alt="btn"></div>
                    <div class="reverse_btn"><img class="reverse__src" src="./img/Reverse.svg" alt="btn"></div>
                </div>
                <div class="stroke2">
                    <div class="add_btn"><img class="add__src" src="./img/+.svg" alt="btn"></div>
                    <div class="text_btn"><img src="./img/T.svg" alt="btn"></div>
                </div>
                <div class="balances">
                    <div class="tokenmini"><img src="./img/tokenMini.svg" alt=""></div>
                    <div class="value">0</div>
                </div>
            </div>
        </div>
        <div class="audio__container">
            <div class="progressmini"></div>
            <div class="buttons">
                <div class="btn_play"><img class="img__src" src="./img/Playmini.svg" alt="btn" /></div>
                <div class="song">
                    <div class="songtitle"></div>
                    <div class="autors">
                        <div class="songautor2"></div>
                        <div class="feat2"></div>
                        <div class="songautors2"></div>
                    </div>
                </div>
                <div class="btn_next"><img class="img__close" src="./img/Nextmini.svg" alt="btn" /></div>
            </div>
        </div>
        <div class="undermenu__container">
            <div class="btn_menu" data-page="home.html">
                <img class="menu__src" src="./img/Menu.svg" data-default="./img/Menu.svg"
                    data-active="./img/MenuActive.svg" alt="btn" />
            </div>
            <div class="btn_music" data-page="music.html">
                <img class="music__src" src="./img/music.svg" data-default="./img/music.svg"
                    data-active="./img/musicActive.svg" alt="btn" />
            </div>
            <div class="btn_airdrop" data-page="airdrop.html">
                <img class="airdrop__src" src="./img/AirDrop.svg" data-default="./img/AirDrop.svg"
                    data-active="./img/AirDropActive.svg" alt="btn" />
            </div>
            <div class="btn_friends" data-page="friends.html">
                <img class="friends__src" src="./img/Friends.svg" data-default="./img/Friends.svg"
                    data-active="./img/FriendsActive.svg" alt="btn" />
            </div>
            <div class="btn_wallet" data-page="wallet.html">
                <img class="wallet__src" src="./img/Wallet.svg" data-default="./img/Wallet.svg"
                    data-active="./img/WalletActive.svg" alt="btn" />
            </div>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
